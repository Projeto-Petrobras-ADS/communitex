spring.application.name=communitex
spring.profiles.active=dev


### Flyway Configuration ####
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#### SpringDoc OpenAPI Configuration ####
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
springdoc.paths-to-match=/api/**,/adocoes/**,/representantes/**
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

#### JWT Configuration ####
jwt.expiration.ms=${JWT_EXPIRATION:3600000}
jwt.secret.key=${JWT_SECRET}
jwt.refresh.expiration.ms=${JWT_REFRESH_EXPIRATION:604800000}

### CORS Configuration ####
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

### JPA Configuration ####
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

### RabbitMQ Configuration ####
# ===== RabbitMQ Configuration =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

# ===== Custom RabbitMQ Configuration =====
app.rabbitmq.notification.exchange=notifications-exchange
app.rabbitmq.notification.queue=notifications-queue
app.rabbitmq.notification.routing-key=notification.*

