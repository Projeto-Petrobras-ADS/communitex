version: '3.8'

services:
  meu-postgres:
    image: postgres:16-alpine
    container_name: postgres-local
    environment:
      POSTGRES_USER: devuser               # Usuário que será criado
      POSTGRES_PASSWORD: devpass           # Senha para este usuário
      POSTGRES_DB: communitex             # Nome do banco de dados que será criado
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d communitex"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-local
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  communitex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: communitex-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://meu-postgres:5432/communitex
      DB_USERNAME: devuser
      DB_PASSWORD: devpass
      JWT_SECRET: ""                        # OBRIGATÓRIO: defina uma chave Base64 segura (ex: openssl rand -base64 64)
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8080:8080"
    depends_on:
      meu-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local